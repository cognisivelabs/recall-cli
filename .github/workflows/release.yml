name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get source tarball sha256
        id: sha
        run: |
          SHA=$(curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.tag.outputs.version }}.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: cognisivelabs/homebrew-tap
          event-type: update-formula
          client-payload: '{"version": "${{ steps.tag.outputs.version }}", "sha256": "${{ steps.sha.outputs.sha256 }}"}'

  update-scoop:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get checksums
        id: sha
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          WIN64_SHA=$(curl -sL "${BASE}/recall_windows_amd64.zip" | sha256sum | cut -d' ' -f1)
          WIN_ARM_SHA=$(curl -sL "${BASE}/recall_windows_arm64.zip" | sha256sum | cut -d' ' -f1)
          echo "win64=$WIN64_SHA" >> $GITHUB_OUTPUT
          echo "winarm=$WIN_ARM_SHA" >> $GITHUB_OUTPUT

      - name: Update Scoop manifest
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: cognisivelabs/scoop-bucket
          event-type: update-manifest
          client-payload: '{"version": "${{ steps.tag.outputs.version }}", "sha256_64": "${{ steps.sha.outputs.win64 }}", "sha256_arm64": "${{ steps.sha.outputs.winarm }}"}'
