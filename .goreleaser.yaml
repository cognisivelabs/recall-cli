version: 2

project_name: recall

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: recall
    dir: .
    main: ./cmd/recall
    binary: recall
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew:
  - repository:
      owner: cognisivelabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/cognisivelabs/recall-cli"
    description: "Your external memory for the terminal. Save, search, and execute commands."
    license: "MIT"
    install: |
      bin.install "recall"
    test: |
      system bin/"recall", "--help"
